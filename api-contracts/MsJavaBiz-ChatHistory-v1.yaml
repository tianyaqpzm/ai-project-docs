openapi: 3.0.0
info:
  title: MsJavaBiz Chat History & Xiaozhi Agent API
  description: 智能对话与聊天历史记录管理接口文档
  version: 1.0.0

servers:
  - url: /
    description: 网关根路径

paths:
  /api/business/xiaozhi/chat:
    post:
      tags:
        - Xiaozhi Agent
      summary: 与协和小智进行对话
      description: 发送消息给小智智能体并获取回复。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatForm'
      responses:
        '200':
          description: 成功返回对话回复
          content:
            text/plain:
              schema:
                type: string
                example: "您好，我是协和小智，请问有什么可以帮您？"
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/dark/v1/history:
    get:
      tags:
        - Chat History
      summary: 获取会话历史记录
      description: 根据会话 ID 获取完整的聊天消息列表。
      parameters:
        - name: sessionId
          in: query
          required: true
          schema:
            type: string
          description: 会话唯一标识
      responses:
        '200':
          description: 成功返回消息列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/dark/v1/history/sessions:
    get:
      tags:
        - Chat History
      summary: 获取所有聊天会话
      description: 返回当前用户的所有历史会话列表。
      responses:
        '200':
          description: 成功返回会话列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSessionDto'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/dark/v1/history/sessions/{sessionId}:
    delete:
      tags:
        - Chat History
      summary: 删除聊天会话
      description: 根据会话 ID 删除指定的聊天记录及其会话信息。
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '240':
          description: 删除成功 (No Content)
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    BadRequestError:
      description: 参数异常 (DEP_0100)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: 未授权 (JWT 校验失败)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: 系统内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChatForm:
      type: object
      properties:
        memoryId:
          type: integer
          format: int64
          description: 记忆/会话 ID
        message:
          type: string
          description: 用户发送的消息内容
      required:
        - message

    ChatMessage:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sessionId:
          type: string
        role:
          type: string
          description: 消息角色 (user/assistant)
        content:
          type: string
          description: 消息内容
        createdAt:
          type: string
          format: date-time
          description: 创建时间

    ChatSessionDto:
      type: object
      properties:
        sessionId:
          type: string
        title:
          type: string
          description: 会话标题
        lastActiveTime:
          type: string
          format: date-time
          description: 最后活跃时间

    ErrorResponse:
      type: object
      properties:
        traceId:
          type: string
          description: 全链路追踪 ID
        status:
          type: integer
          description: HTTP 状态码
        error_code:
          type: string
          description: 业务自定义错误码 (如 DEP_0100 代表参数异常)
        error_msg:
          type: string
          description: 业务自定义错误消息 (支持国际化)
        path:
          type: string
          description: 请求路径
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
