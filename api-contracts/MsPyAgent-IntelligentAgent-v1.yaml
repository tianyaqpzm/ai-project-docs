openapi: 3.0.0
info:
  title: MsPyAgent Intelligent Agent API
  description: 智能 Agent 对话、RAG 检索与问答接口文档
  version: 1.0.0

servers:
  - url: /
    description: 网关根路径

paths:
  /rest/dark/v1/agent/chat:
    post:
      tags:
        - Intelligent Agent
      summary: Agent 智能对话 (SSE)
      description: 发送消息给智能 Agent，通过 LangGraph 工作流处理并流式返回 Token。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE 流响应开始
          content:
            text/event-stream:
              schema:
                type: string
                example: "data: {\"content\": \"你好\"}\n\n"
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/kb/v1/documents/ingest:
    post:
      tags:
        - Knowledge Base
      summary: 本地文件入库分析及索引
      description: 接收本地物理文件路径，调用智能提取与向量化索引，存入数据库。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '201':
          description: 入库成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  metrics:
                    type: object
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/kb/v1/retrieve:
    post:
      tags:
        - Knowledge Base
      summary: 知识库检索 (向量查询)
      description: 根据查询文本在指定分类中检索最相关的知识片段。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetrievalRequest'
      responses:
        '200':
          description: 检索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetrievalResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /rest/kb/v1/ask:
    post:
      tags:
        - Knowledge Base
      summary: 知识检索+聊天集成回答
      description: 接收提问，先检索知识库，再由 LLM 生成答案。支持 SSE 流式返回。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: SSE 或 JSON 响应
          content:
            text/event-stream:
              schema:
                type: string
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    BadRequestError:
      description: 参数异常 (DEP_0100)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: 未授权 (JWT 校验失败)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: 系统内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ChatRequest:
      type: object
      properties:
        session_id:
          type: string
        message:
          type: string
        topic_id:
          type: string
      required:
        - session_id
        - message

    IngestRequest:
      type: object
      properties:
        file_path:
          type: string
          description: 物理文件的绝对路径
        category:
          type: string
          description: 分类标签
        tenant_id:
          type: string
          default: default
        chunk_size:
          type: integer
          description: 文本分块大小
        chunk_overlap:
          type: integer
          description: 片段重叠字符数
        separators:
          type: array
          items:
            type: string
          description: 文本切割偏好符号
        embedding_model:
          type: string
          description: Embedding 模型
        vector_store:
          type: string
          description: 向量数据库类型
        top_k:
          type: integer
          default: 5
          description: 检索结果数
        score_threshold:
          type: number
          format: float
          description: 评分阈值
        enable_hybrid_search:
          type: boolean
          default: true
          description: 是否启用混合检索
        alpha_weight:
          type: number
          format: float
          default: 0.5
          description: 权重比例
        generation_model:
          type: string
          description: 生成模型名称
        temperature:
          type: number
          format: float
          default: 0.7
          description: 采样温度
        max_tokens:
          type: integer
          default: 1000
          description: 最大生成长度
        system_prompt:
          type: string
          description: 系统提示词
        enable_evaluation:
          type: boolean
          default: false
          description: 是否开启自动评估
        evaluation_metrics:
          type: array
          items:
            type: string
          description: 评估指标列表
      required:
        - file_path
        - category

    RetrievalRequest:
      type: object
      properties:
        query:
          type: string
        category:
          type: string
        tenant_id:
          type: string
          default: default
        top_k:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
      required:
        - query

    RetrievalResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        total_found:
          type: integer

    AskRequest:
      type: object
      properties:
        query:
          type: string
        category:
          type: string
        tenant_id:
          type: string
          default: default
        stream:
          type: boolean
          default: true
      required:
        - query

    ErrorResponse:
      type: object
      properties:
        traceId:
          type: string
          description: 全链路追踪 ID
        status:
          type: integer
          description: HTTP 状态码
        error_code:
          type: string
          description: 业务自定义错误码 (如 DEP_0100 代表参数异常)
        error_msg:
          type: string
          description: 业务自定义错误消息 (支持国际化)
        path:
          type: string
          description: 请求路径
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
