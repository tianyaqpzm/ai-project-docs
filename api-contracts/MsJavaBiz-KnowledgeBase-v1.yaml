openapi: 3.0.0
info:
  title: MsJavaBiz Knowledge Base API
  description: 知识库主题、文档管理与入库索引接口文档
  version: 1.0.0

servers:
  - url: /
    description: 网关根路径

paths:
  /rest/dark/v1/knowledge/topics:
    get:
      tags:
        - Knowledge Topic
      summary: 获取所有知识库主题
      description: 返回当前系统中所有可用的知识库主题列表。
      responses:
        '200':
          description: 成功返回主题列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeTopic'
    post:
      tags:
        - Knowledge Topic
      summary: 创建知识库主题
      description: 创建一个新的知识库主题，用于组织相关的知识文档。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeTopic'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeTopic'

  /rest/dark/v1/knowledge/topics/{id}:
    put:
      tags:
        - Knowledge Topic
      summary: 更新知识库主题
      description: 修改指定 ID 的知识库主题信息。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeTopic'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeTopic'
    delete:
      tags:
        - Knowledge Topic
      summary: 删除知识库主题
      description: 删除指定 ID 的知识库主题及其下属的所有文档。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /rest/dark/v1/knowledge/documents:
    get:
      tags:
        - Knowledge Document
      summary: 根据主题获取文档列表
      description: 返回指定主题下的所有文档记录。
      parameters:
        - name: topicId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功返回文档列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KnowledgeDocument'
    post:
      tags:
        - Knowledge Document
      summary: 创建文档记录
      description: 在系统中注册一个新的文档记录。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeDocument'
      responses:
        '200':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocument'

  /rest/dark/v1/knowledge/documents/{id}:
    delete:
      tags:
        - Knowledge Document
      summary: 删除文档
      description: 删除指定的文档记录及其物理文件。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /rest/dark/v1/knowledge/documents/{id}/ingest:
    post:
      tags:
        - Knowledge Document
      summary: 触发文档入库索引
      description: 启动文档的切片、向量化及存入向量数据库的过程。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 任务已启动
          content:
            application/json:
              schema:
                type: object

  /rest/dark/v1/knowledge/documents/{id}/file:
    get:
      tags:
        - Knowledge Document
      summary: 预览文档文件
      description: 获取文档对应的物理文件内容，用于预览或下载。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功返回文件流
          content:
            '*/*':
              schema:
                type: string
                format: binary

components:
  schemas:
    KnowledgeTopic:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        description:
          type: string
        visibleScope:
          type: string
        templateName:
          type: string
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time

    KnowledgeDocument:
      type: object
      properties:
        id:
          type: string
        topicId:
          type: string
        title:
          type: string
        status:
          type: string
          description: 文档状态 (CREATED, PROCESSING, PUBLISHED, FAILED)
        author:
          type: string
        filePath:
          type: string
        config:
          $ref: '#/components/schemas/KnowledgeConfig'
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time

    KnowledgeConfig:
      type: object
      properties:
        chunkSize:
          type: integer
        chunkOverlap:
          type: integer
        separators:
          type: array
          items:
            type: string
        embeddingModel:
          type: string
        vectorStore:
          type: string
        topK:
          type: integer
        scoreThreshold:
          type: number
          format: double
        enableHybridSearch:
          type: boolean
        alphaWeight:
          type: number
          format: double
