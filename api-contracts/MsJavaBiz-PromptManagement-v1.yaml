openapi: 3.0.0
info:
  title: ms-java-biz Prompt Management API
  description: 动态 Prompt 模板与版本管理接口文档
  version: 1.0.0

servers:
  - url: /api/business
    description: 业务服务 API 根路径

paths:
  /rest/biz/v1/prompts/{slug}:
    get:
      tags:
        - Runtime
      summary: 获取生效状态的 Prompt 模板与版本配置
      description: 根据 slug 获取当前标记为 active 的 Prompt 详情，用于业务侧执行 LLM 调用。
      parameters:
        - name: slug
          in: path
          required: true
          description: Prompt 模板的业务唯一标识
          schema:
            type: string
            example: "default_kb_assistant"
      responses:
        '200':
          description: 成功获取 Prompt 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'
        '404':
          description: 提示词未找到 (DEP_0100)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rest/biz/v1/prompts/templates:
    get:
      tags:
        - Management
      summary: 获取 Prompt 模板列表
      responses:
        '200':
          description: 成功返回模板列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptTemplate'

  /rest/biz/v1/prompts/templates/{templateId}/versions:
    get:
      tags:
        - Management
      summary: 获取指定模板的版本历史
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功返回版本列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptVersion'
        '404':
          description: 模板未找到 (DEP_0100)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Management
      summary: 保存新的 Prompt 版本
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionRequest'
      responses:
        '200':
          description: 保存成功
        '400':
          description: 内容校验失败 (DEP_0102)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 版本号冲突 (DEP_0101)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /rest/biz/v1/prompts/versions/{versionId}/activate:
    patch:
      tags:
        - Management
      summary: 激活指定版本
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 激活成功
        '404':
          description: 版本未找到 (DEP_0100)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 激活操作非法 (DEP_0103)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    PromptTemplate:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
        type:
          type: string
          enum: [System, User, Tool]
        description:
          type: string
        createTime:
          type: string
          format: date-time
        updateTime:
          type: string
          format: date-time

    PromptVersion:
      type: object
      properties:
        id:
          type: integer
        templateId:
          type: integer
        versionTag:
          type: string
        content:
          type: string
        variables:
          type: array
          items:
            type: string
        modelConfig:
          type: object
        isActive:
          type: boolean
        createTime:
          type: string
          format: date-time

    CreateVersionRequest:
      type: object
      required: [versionTag, content]
      properties:
        versionTag:
          type: string
          example: "v1.1.0"
        content:
          type: string
        variables:
          type: array
          items:
            type: string
        modelConfig:
          type: object

    PromptResponse:
      type: object
      properties:
        slug:
          type: string
        versionTag:
          type: string
        content:
          type: string
        modelConfig:
          type: object
        variables:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      properties:
        traceId:
          type: string
        status:
          type: integer
        error_code:
          type: string
          example: "DEP_0100"
        error_msg:
          type: string
          example: "提示词未找到"
        path:
          type: string
        timestamp:
          type: string
          format: date-time
