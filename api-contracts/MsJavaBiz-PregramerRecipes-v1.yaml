openapi: 3.0.0
info:
  title: ms-java-biz Recipe API
  description: 菜谱管理与推荐接口文档
  version: 1.0.0

servers:
  - url: /api/business
    description: 业务服务 API 根路径

paths:
  /recipes/recommend:
    get:
      summary: 获取个性化菜谱推荐
      description: 根据当前时间、用户偏好等返回推荐的菜谱列表。
      responses:
        '200':
          description: 成功返回推荐列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeDTO'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /recipes/favorite:
    post:
      summary: 收藏/取消收藏菜谱
      description: 切换菜谱的收藏状态。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recipeId:
                  type: integer
                  format: int64
                isFavorite:
                  type: boolean
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  responses:
    BadRequestError:
      description: 参数异常 (DEP_0100)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: 未授权 (JWT 校验失败)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: 系统内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    RecipeDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: "玉米肉沫拌饭"
        difficulty:
          type: string
          enum: [EASY, MEDIUM, HARD]
          example: "MEDIUM"
        difficultyLabel:
          type: string
          example: "中等"
        imageUrl:
          type: string
          example: "https://example.com/images/recipe1.jpg"
        isFavorite:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      properties:
        traceId:
          type: string
          description: 全链路追踪 ID
        status:
          type: integer
          description: HTTP 状态码
        error_code:
          type: string
          description: 业务自定义错误码 (如 DEP_0100 代表参数异常)
        error_msg:
          type: string
          description: 业务自定义错误消息 (支持国际化)
        path:
          type: string
          description: 请求路径
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
