openapi: 3.0.0
info:
  title: MsJavaBiz Common Upload API
  description: 通用文件上传接口文档，支持根据业务类型路由不同的上传策略。
  version: 1.0.0

servers:
  - url: /
    description: 网关根路径

paths:
  /rest/dark/v1/upload/{type}:
    post:
      tags:
        - Common Upload
      summary: 按照业务类型上传文件
      description: 根据路径参数 `type`（如 knowledge）决定文件存储与处理策略。
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          description: 业务类型 (e.g., knowledge)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 待上传的文件
                extraParams:
                  type: object
                  description: 额外的业务参数
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  url:
                    type: string
                  status:
                    type: string
        '400':
          description: 参数错误或不支持的上传类型
